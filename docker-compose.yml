version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: eduflow
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always
    ports:
      - "5433:5432"

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/alembic:/app/alembic
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:password@db:5432/eduflow
      - REDIS_URL=redis://redis:6379/0
      - OPENROUTER_API_KEYS=${OPENROUTER_API_KEYS:-""}
      - SECRET_KEY=yoursecretkeyhere_change_it_in_production
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=1440
      - EMAIL_SENDER=rosoxau@gmail.com
      - EMAIL_PASSWORD=diluzpwkjhjqwwjh
    depends_on:
      - db
      - redis
    restart: always

  frontend:
    build:
      context: ./frontend
      args:
        - VITE_API_URL=
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: always

volumes:
  postgres_data:
